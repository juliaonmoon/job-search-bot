services:
  - type: web
    name: job-search-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python dashboard.py
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # set manually in Render dashboard
      - key: GITHUB_TOKEN
        sync: false          # set manually — needs repo write access
      - key: GITHUB_REPO
        value: juliaonmoon/job-search-bot
